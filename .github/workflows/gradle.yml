name: Build

on: push

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: gradle

      - name: Compile
        run: ./gradlew compileTestJava
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Start virtual display
        run: |
          sudo apt update
          sudo apt install -y xvfb openbox
          Xvfb :99 -screen 0 1024x768x24 > /dev/null 2>&1 &
          echo "DISPLAY=:99" >> $GITHUB_ENV
          sleep 2
          # TestFX/JavaFX popups (ComboBox dropdowns) need a window manager to
          # register mouse clicks correctly; plain Xvfb has none. Openbox's default
          # keybindings (e.g. Ctrl+Alt+Up/Down) collide with the app's own hotkeys,
          # so start it with an empty keyboard/mouse config.
          mkdir -p /tmp/openbox-config
          # xmlns="http://openbox.org/3.4/rc" is openbox's fixed XML namespace URI, matched
          # literally by openbox's config parser, never dereferenced over the network.
          echo '<?xml version="1.0" encoding="UTF-8"?><openbox_config xmlns="http://openbox.org/3.4/rc"><keyboard></keyboard><mouse></mouse></openbox_config>' > /tmp/openbox-config/rc.xml # NOSONAR
          DISPLAY=:99 openbox --config-file /tmp/openbox-config/rc.xml > /dev/null 2>&1 &
          sleep 2

      - name: Test
        run: ./gradlew -PskipIntegrationTests test
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: SonarCloud analysis
        run: ./gradlew -PskipIntegrationTests sonar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Upload reports
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-report
          path: build/reports