name: Build

on: push

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: gradle

      - name: Compile
        run: ./gradlew compileTestJava
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # The Gradle test task starts (and tears down) its own Xvfb + openbox virtual
      # display — see the test block in build.gradle; CI only installs the packages.
      - name: Install virtual display packages
        run: |
          sudo apt update
          sudo apt install -y xvfb openbox

      - name: Test
        run: ./gradlew -PskipIntegrationTests test
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: SonarCloud analysis
        run: ./gradlew -PskipIntegrationTests sonar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Upload reports
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-report
          path: build/reports